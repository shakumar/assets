<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combo Product Showcase</title>
  <style>
    .productdetail-body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: white;
      color: #333;
    }
    .productdetail-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 10px;
    }
    .productdetail-section {
      margin-bottom: 50px;
      text-align: center;
    }
	.productdetail-section-last {
      margin-bottom: 2px;
      text-align: center;
    }
    .productdetail-badge {
      background: white;
      color: white;
      display: inline-block;
      padding: 14px 36px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 22px;
      border-radius: 40px;
      margin-bottom: 25px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    .productdetail-desc {
      font-size: 18px;
      max-width: 800px;
      margin: 20px auto;
      line-height: 1.7;
    }
    .productdetail-card-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-top: 35px;
    }
    .productdetail-img-card {
      background: white;
      border-radius: 20px;
      padding: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .productdetail-img-card:hover {
      transform: scale(1.07);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.2);
    }
    .productdetail-img-card img {
      max-width:100%;
      border-radius: 15px;
      display: block;
    }
  </style>
</head>
<body class="productdetail-body">
  <div class="productdetail-container">

    <div class="productdetail-section">
      <div class="productdetail-badge" style="background: linear-gradient(to right, #f5b642, #f0932b);">Material</div>
      <p class="productdetail-desc">
        Cup Glass Pot Combo — latest design with glass & chini mitti material.
      </p>
      <div class="productdetail-card-grid">
        <div class="productdetail-img-card"><img src="/images/product-image/DEALD00002-1/1.webp" alt="Design cup glass"></div>
      </div>
    </div>

    <div class="productdetail-section-last">
      <div class="productdetail-badge" style="background: linear-gradient(to right, #ff7e5f, #feb47b);">About Product Usage</div>
      <p class="productdetail-desc">
        Little Heart Tableware Eleganty packed in an orange box with floral design bowl and to small glass the word combo at the bottom that ideal for everyday kitchen use.
      </p>
      <div class="productdetail-card-grid">
        <div class="productdetail-img-card"><img src="/images/product-image/DEALD00002-1/2.webp" alt="Material cup"></div>
        <div class="productdetail-img-card"><img src="/images/product-image/DEALD00002-1/3.webp" alt="Material glass"></div>
      </div>
    </div>

  </div>
</body>
</html>
